ession","id":5,"no":5}],"判断题":[{"question":"service()方法会根据请求方式自动分发 doGet/doPost 方法。（ ）","answer":"正确","id":1,"no":1},{"question":"重定向跳转无法保留 request 域中的数据。（ ）","answer":"正确","id":2,"no":2},{"question":"Servlet 多线程运行，局部变量存在线程安全问题。（ ）","answer":"错误","id":3,"no":3},{"question":"注解配置 Servlet 无需手动配置 web.xml 文件。（ ）","answer":"正确","id":4,"no":4}],"简答题":[{"question":"简述 GET 与 POST 请求的核心区别及适用场景。","answer":"核心区别：1.参数传输：GET 参数拼接在 URL 后，明文展示；POST 参数封装在请求 体，隐藏传输。2.数据限制：GET 有 URL 长度限制，无法传输大数据；POST 无长度限制，支持文 件上传。3.缓存特性：GET 可被浏览器缓存，POST 默认不缓存。4.安全性：POST 安全性高于 GET，适合敏感数据传输。适用场景：GET 适用于查询、页面跳转、无参数或简单公开参数请求； POST 适用于表单提交、数据新增/修改、文件上传、密码等敏感数据提交。","id":1,"no":1}]}},{"title":"第七章 MVC 模式","questions":{"单项选择题":[{"question":"MVC 模式中负责处理业务逻辑、操作数据的层级是（ ）","options":{"A":"视图层 V","B":"控制层 C","C":"模型层 M","D":"持久层"},"answer":"C","id":1,"no":1},{"question":"JSP MVC 模式中，控制层的核心组件是（ ）","options":{"A":"JSP","B":"Servlet","C":"JavaBean","D":"File 类"},"answer":"B","id":2,"no":2},{"question":"MVC 模式的核心设计思想是（ ）","options":{"A":"代码集中编写","B":"分层解耦、职责分离","C":"简化代码行数","D":"提升编译速度"},"answer":"B","id":3,"no":3},{"question":"模型层数据更新后，视图层会（ ）","options":{"A":"自动刷新展示最新数据","B":"无需刷新直接更新","C":"永久保留旧数据","D":"自动清空所有数据"},"answer":"A","id":4,"no":4}],"多项选择题":[{"question":"传统 JSP 开发模式的缺点有（ ）","options":{"A":"页面代码混杂 Java 脚本","B":"展示与业务逻辑耦合严重","C":"代码冗余、难以维护","D":"分层清晰、结构规范"},"answer":"ABC","id":1,"no":1},{"question":"JSP MVC 各层级职责说法正确的有（ ）","options":{"A":"View：仅负责页面数据展示，无业务逻辑","B":"Controller：接收请求、调度业务、跳转视图","C":"Model：封装数据、处理业务、操作数据库","D":"各层级职责交叉重叠，灵活适配"},"answer":"ABC","id":2,"no":2},{"question":"MVC 模式下模型层的特点有（ ）","options":{"A":"独立于视图和控制层","B":"可被多个视图复用","C":"数据更新可同步刷新视图","D":"直接接收客户端请求"},"answer":"ABC","id":3,"no":3}],"填空题":[{"question":"MVC 中__________层是用户与程序交互的入口，负责页面展示。","answer":"视图（View）","id":1,"no":1},{"question":"模型层的生命周期由__________层调度管理。","answer":"控制（Controller）","id":2,"no":2}],"判断题":[{"question":"MVC 模式彻底分离了数据、控制、展示三层逻辑。（ ）","answer":"正确","id":1,"no":1},{"question":"MVC 模式中控制层直接操作数据库处理数据。（ ）","answer":"错误","id":2,"no":2}],"简答题":[{"question":"对比传统 JSP 开发模式与 MVC 开发模式的优缺点。","answer":"1.传统 JSP 模式：优点是开发简单、上手快速、适合小型项目；缺点是页面混杂 HTML、Java 脚本、数据库操作代码，耦合度极高，代码冗余，维护迭代困难，无法分工开发。 2.MVC 模式：优点是三层分层解耦，职责清晰，代码复用性高，便于维护、迭代和团队分工，视图 与数据分离，适配大型项目；缺点是架构相对复杂，开发流程稍多，小型简单项目开发效率略低。","id":1,"no":1}]}},{"title":"第八章 JSP 中使用数据库","questions":{"单项选择题":[{"question":"新版 MySQL 驱动类的全路径是（ ）","options":{"A":"com.mysql.jdbc.Driver","B":"com.mysql.cj.jdbc.Driver","C":"mysql.jdbc.Driver","D":"com.mysql.driver"},"answer":"B","id":1,"no":1},{"question":"下列 SQL 语句属于数据更新操作的是（ ）","options":{"A":"SELECT","B":"INSERT","C":"UPDATE","D":"DROP"},"answer":"C","id":2,"no":2},{"question":"事务的原子性是指（ ）","options":{"A":"事务数据永久保存","B":"事务要么全部成功，要么全部失败","C":"事务互不干扰","D":"数据状态一致"},"answer":"B","id":3,"no":3},{"question":"分页查询中，每页显示 5 条数据，第 3 页的起始索引是（ ）","options":{"A":"10","B":"15","C":"5","D":"3"},"answer":"A","id":4,"no":4},{"question":"能够有效防止 SQL 注入的核心技术是（ ）","options":{"A":"Statement","B":"PreparedStatement","C":"连接池","D":"事务"},"answer":"B","id":5,"no":5},{"question":"提交事务的 JDBC 方法是（ ）","options":{"A":"rollback()","B":"commit()","C":"execute()","D":"close()"},"answer":"B","id":6,"no":6},{"question":"SQL Server 连接 URL 的默认端口是（ ）","options":{"A":"3306","B":"1433","C":"8080","D":"3308"},"answer":"B","id":7,"no":7},{"question":"数据库连接池的核心优势是解决（ ）问题","options":{"A":"SQL 注入","B":"频繁创建销毁连接、资源浪费","C":"事务失效","D":"乱码问题"},"answer":"B","id":8,"no":8},{"question":"ResultSet 遍历结束后的返回值是（ ）","options":{"A":"true","B":"false","C":"null","D":"0"},"answer":"B","id":9,"no":9},{"question":"执行数据库删除操作的 SQL 关键字是（ ）","options":{"A":"DELETE","B":"REMOVE","C":"DROP","D":"CLEAR"},"answer":"A","id":10,"no":10},{"question":"开启手动事务的核心操作是（ ）","options":{"A":"设置自动提交为 true","B":"设置自动提交为 false","C":"关闭数据库连接","D":"初始化驱动"},"answer":"B","id":11,"no":11},{"question":"Access 数据库连接依赖的桥接技术是（ ）","options":{"A":"JDBC 直连","B":"JDBC-ODBC","C":"数据库连接池","D":"预处理连接"},"answer":"B","id":12,"no":12}],"多项选择题":[{"question":"属于数据库 DML 数据操作语句的有（ ）","options":{"A":"SELECT 查询","B":"INSERT 添加","C":"UPDATE 更新","D":"DELETE 删除"},"answer":"ABCD","id":1,"no":1},{"question":"预处理语句的优势包含（ ）","options":{"A":"SQL 预编译，执行效率高","B":"占位符传参，杜绝 SQL 注入","C":"支持动态参数设置","D":"无需关闭资源"},"answer":"ABC","id":2,"no":2},{"question":"数据库事务正确处理流程包括（ ）","options":{"A":"关闭自动提交","B":"执行多条 SQL 操作","C":"无异常手动 commit 提交","D":"出现异常 rollback 回滚"},"answer":"ABCD","id":3,"no":3},{"question":"数据库连接池的核心特点有（ ）","options":{"A":"提前初始化一批数据库连接","B":"连接复用，无需频繁创建","C":"统一管理连接、限制最大连接数","D":"使用后销毁连接释放资源"},"answer":"ABC","id":4,"no":4},{"question":"JDBC 编程中必须关闭的资源有（ ）","options":{"A":"ResultSet 结果集","B":"Statement 语句对象","C":"Connection 连接对象","D":"页面内置对象"},"answer":"ABC","id":5,"no":5},{"question":"MySQL 分页查询的优势有（ ）","options":{"A":"减少单次查询数据量","B":"提升页面加载速度","C":"降低服务器压力","D":"避免数据加载过多卡顿"},"answer":"ABCD","id":6,"no":6},{"question":"下列关于 Statement 与 PreparedStatement 对比正确的有（ ）","options":{"A":"Statement 易产生 SQL 注入漏洞","B":"PreparedStatement 支持预编译","C":"Statement 适合静态固定 SQL","D":"PreparedStatement 适合动态参数 SQL"},"answer":"ABCD","id":7,"no":7},{"question":"支持分页查询的数据库及关键字正确的有（ ）","options":{"A":"MySQL：limit","B":"SQL Server：top","C":"Access：top","D":"Oracle：rownum"},"answer":"ABCD","id":8,"no":8}],"填空题":[{"question":"新版 MySQL 连接 URL 需要添加__________参数解决时区问题。","answer":"serverTimezone=Asia/Shanghai","id":1,"no":1},{"question":"预处理语句通过__________作为参数占位符，实现动态传参。","answer":"?","id":2,"no":2},{"question":"数据库事务四大特性简写为__________。","answer":"ACID","id":3,"no":3},{"question":"查询数据库多条数据返回的对象是__________。","answer":"ResultSet","id":4,"no":4},{"question":"连接池获取连接后，使用完毕需__________而非销毁。","answer":"归还连接池","id":5,"no":5},{"question":"批量操作数据库、保证数据一致性必须使用__________。","answer":"数据库 事务","id":6,"no":6}],"判断题":[{"question":"预处理语句可以有效避免字符串拼接导致的 SQL 注入问题。（ ）","answer":"正确","id":1,"no":1},{"question":"数据库事务提交后，数据修改永久生效，无法回滚。（ ）","answer":"正确","id":2,"no":2},{"question":"连接池中的连接可以无限创建，无数量限制。（ ）","answer":"错误","id":3,"no":3},{"question":"ResultSet 默认游标从第一行数据前开始遍历。（ ）","answer":"正确","id":4,"no":4},{"question":"手动事务必须手动提交或回滚，否则数据失效。（ ）","answer":"正确","id":5,"no":5}],"简答题":[{"question":"简述数据库事务的作用及使用场景。","answer":"事务作用：保证一组数据库操作的原子性、一致性、隔离性、持久性，多条关联 SQL 语句要么全部执行成功，要么全部回滚撤销，避免出现数据不一致、数据错乱、部分更新的问题， 保障数据库数据安全可靠。使用场景：适用于多条 SQL 关联操作的业务场景，如转账操作（扣款+ 入账）、订单生成（订单数据+库存修改）、批量数据新增/修改/删除、商品秒杀扣减库存+生成交易 记录等需要保证数据完整性的业务场景，杜绝部分操作成功、部分操作失败的数据漏洞。","id":1,"no":1}]}},{"title":"第九章 JSP 文件操作","questions":{"单项选择题":[{"question":"JSP 中用于封装文件与文件夹路径信息的核心类是（ ）","options":{"A":"FileWriter","B":"File","C":"BufferedReader","D":"RandomAccessFile"},"answer":"B","id":1,"no":1},{"question":"下列方法中，可实现批量删除非空文件夹的是（ ）","options":{"A":"delete()","B":"deleteOnExit()","C":"递归遍历删除文件后删除文件夹","D":"remove()"},"answer":"C","id":2,"no":2},{"question":"实现服务器文件下载时，必须设置的响应头是（ ）","options":{"A":"Content-Type","B":"Content-Disposition","C":"Accept","D":"Referer"},"answer":"B","id":3,"no":3},{"question":"字符流读写文件适合处理的文件类型是（ ）","options":{"A":"图片、视频","B":"文本、jsp、html 文件","C":"压缩包、exe 程序","D":"音频文件"},"answer":"B","id":4,"no":4}],"多项选择题":[{"question":"下列属于 File 类常用功能方法的有（ ）","options":{"A":"length()获取文件大小","B":"renameTo()重命名文件","C":"mkdir()创建单级文件夹","D":"listFiles()遍历文件夹所有文件"},"answer":"ABCD","id":1,"no":1},{"question":"关于文件字节流与字符流说法正确的有（ ）","options":{"A":"字节流通用所有文件类型，万能读写","B":"字符流仅适配文本文件，可避免乱码","C":"字节流无缓冲区，字符流自带缓冲区","D":"读写文件后均需手动关闭流资源"},"answer":"ABCD","id":2,"no":2},{"question":"JSP 文件上传的安全优化措施包含（ ）","options":{"A":"限制文件上传大小","B":"过滤非法文件后缀（exe、jsp 等）","C":"生成唯一文件名防止覆盖","D":"统一存放路径，禁止覆盖系统目录"},"answer":"ABCD","id":3,"no":3}],"填空题":[{"question":"RandomAccessFile 类中__________方法可获取当前文件指针位置。","answer":"getFilePointer()","id":1,"no":1},{"question":"文件上传表单必须设置的编码类型是__________。","answer":"multipart/form-data","id":2,"no":2}],"判断题":[{"question":"delete()方法可以直接删除包含文件的非空文件夹。（ ）","answer":"错误","id":1,"no":1},{"question":"字节流读写二进制文件不会出现乱码问题。（ ）","answer":"正确","id":2,"no":2}],"简答题":[{"question":"简述 JSP 文件下载的完整实现步骤及核心注意点。","answer":"实现步骤：1. 定义服务器端待下载文件的真实路径，通过 ServletContext 获取项目绝 对路径；2. 设置响应头信息，通过 Content-Disposition 指定文件下载方式和文件名；3. 获取文件输 入流，读取服务器端目标文件数据；4. 获取 response 输出流，将读取的文件数据写入客户端响应； 5. 循环读写数据，完成文件传输；6. 关闭所有 IO 流资源，结束响应。核心注意点：需处理中文文件 名乱码问题，对文件名进行编码转换；必须关闭 IO 流避免资源泄露；校验文件是否存在，防止下载 路径异常；限制下载权限，避免任意文件漏洞。","id":1,"no":1}]}}],"note":"由《JSP 程序设计课程复习题 2》整理；按项目现有题库结构生成。"},"jsp3":{"title":"JSP程序设计课程题库-复习题3","chapters":[{"title":"第一章 JSP 简介","questions":{"单项选择题":[{"question":"下列不属于 JSP 动态网页技术优势的是（ ）","options":{"A":"可对接数据库实现数据交互","B":"支持用户动态交互业务","C":"页面内容固定无需编译","D":"服务端处理逻辑安全性更高"},"answer":"C","id":1,"no":1},{"question":"标准 JSP Web 项目中，存放核心配置文件的目录是（ ）","options":{"A":"项目根目录","B":"WEB-INF 目录","C":"classes 目录","D":"lib 目录"},"answer":"B","id":2,"no":2},{"question":"客户端访问 JSP 页面的正确执行顺序是（ ）","options":{"A":"浏览器直接渲染→服务器响应","B":"客户端发送请求→服务器编译执行→响应页面","C":"服务器主动推送→客户端解析","D":"本地编译→服务器运行"},"answer":"B","id":3,"no":3}],"多项选择题":[{"question":"下列属于动态网页技术特征的有（ ）","options":{"A":"页面内容可实时变更","B":"支持用户提交数据、查询数据","C":"依赖服务器编译运行","D":"所有用户访问页面内容完全一致"},"answer":"ABC","id":1,"no":1},{"question":"关于 Tomcat Web 容器功能说法正确的有（ ）","options":{"A":"负责接收客户端 HTTP 请求","B":"编译、运行 JSP 和 Servlet 程序","C":"管理项目生命周期与资源","D":"直接操作数据库存储数据"},"answer":"ABC","id":2,"no":2}],"填空题":[{"question":"Web 项目中，存放第三方 jar 包的默认目录是__________。","answer":"WEB-INF/lib","id":1,"no":1},{"question":"JSP 是基于__________语言的服务端动态网页技术。","answer":"Java","id":2,"no":2}],"判断题":[{"question":"WEB-INF 目录下的文件无法通过浏览器直接访问。（ ）","answer":"正确","id":1,"no":1},{"question":"JSP 运行仅需要 JDK 支持，无需 Web 容器即可独立运行。（ ）","answer":"错误","id":2,"no":2}],"简答题":[{"question":"简述 JSP 作为服务端动态网页技术的核心特点及适用业务场景。","answer":"核心特点：1.服务端运行：所有 Java 逻辑代码在服务器端编译执行，客户端仅接收纯 静态页面，安全性高；2.动态性强：可根据用户操作、数据库数据、会话状态实时生成页面内容； 3.Java 兼容：完全依托 Java 语法，可调用所有 Java 核心类库，功能强大；4.代码混编：支持 HTML、CSS、JS 与 Java 代码混合编写，开发便捷。适用场景：适用于所有需要人机交互、数据存 储、动态更新的 Web 业务，如用户注册登录、信息查询发布、后台管理系统、留言板、数据统计展 示等动态业务，不适用于内容长期固定的静态展示页面。","id":1,"no":1}]}},{"title":"第二章 JSP 语法","questions":{"单项选择题":[{"question":"下列关于 JSP 声明标签说法错误的是（ ）","options":{"A":"可定义全局常量","B":"定义的方法全局有效","C":"每次访问页面都会重新初始化","D":"编译阶段仅执行一次"},"answer":"C","id":1,"no":1},{"question":"page 指令中设置页面文本编码格式的属性是（ ）","options":{"A":"contentType","B":"pageEncoding","C":"language","D":"session"},"answer":"B","id":2,"no":2},{"question":"静态包含指令的标签名称是（ ）","options":{"A":"<jsp:include>","B":"@include","C":"@taglib","D":"<jsp:param>"},"answer":"B","id":3,"no":3},{"question":"若需要页面禁止自动创建 session 对象，page 指令属性配置为（ ）","options":{"A":"session=\"true\"","B":"session=\"false\"","C":"autoFlush=\"false\"","D":"isErrorPage=\"false\""},"answer":"B","id":4,"no":4},{"question":"JSP 表达式的核心作用是（ ）","options":{"A":"定义全局方法","B":"执行复杂循环逻辑","C":"直接输出运算结果到页面","D":"导入外部类库"},"answer":"C","id":5,"no":5},{"question":"动态包含动作标签的执行时机是（ ）","options":{"A":"页面编译阶段","B":"页面运行阶段","C":"服务器启动阶段","D":"项目部署阶段"},"answer":"B","id":6,"no":6}],"多项选择题":[{"question":"属于 JSP 脚本元素的有（ ）","options":{"A":"JSP 声明 <%! %>","B":"程序片 <% %>","C":"表达式 <%= %>","D":"指令 <%@ %>"},"answer":"ABC","id":1,"no":1},{"question":"动态包含相比静态包含的优势有（ ）","options":{"A":"支持动态参数传递","B":"被包含页面独立编译","C":"修改被包含页面无需重编译主页面","D":"运行效率更高、资源占用更少"},"answer":"ABC","id":2,"no":2},{"question":"page 指令中用于异常处理的属性有（ ）","options":{"A":"isErrorPage","B":"errorPage","C":"buffer","D":"info"},"answer":"AB","id":3,"no":3},{"question":"下列 JSP 语法书写规范正确的有（ ）","options":{"A":"表达式无分号结尾","B":"程序片可编写完整 Java 逻辑","C":"声明标签可定义成员变量","D":"指令标签可重复多次定义"},"answer":"ABCD","id":4,"no":4}],"填空题":[{"question":"配置页面错误跳转页面的 page 指令属性是__________。","answer":"errorPage","id":1,"no":1},{"question":"JSP 动态包含的动作标签是__________。","answer":"<jsp:include>","id":2,"no":2},{"question":"用于定义页面缓冲区大小的 page 属性是__________。","answer":"buffer","id":3,"no":3}],"判断题":[{"question":"静态包含会将多个页面代码合并为一个 Servlet 文件。（ ）","answer":"正确","id":1,"no":1},{"question":"JSP 程序片定义的变量属于局部变量，仅当前执行有效。（ ）","answer":"正确","id":2,"no":2},{"question":"taglib 指令只能引入系统内置标签库。（ ）","answer":"错误","id":3,"no":3}],"简答题":[{"question":"简述静态包含与动态包含的核心区别、优缺点及适用场景。","answer":"核心区别：1.执行时机：静态包含是编译阶段合并代码，动态包含是运行阶段加载页 面；2.编译方式：静态包含所有页面合并为一个 class 文件，动态包含每个页面独立编译为单独 class 文件；3.参数传递：静态包含不支持传参，动态包含可通过 jsp:param 传递动态参数。优缺 点：静态包含编译速度慢、修改页面需重编译整体，但运行效率高；动态包含灵活性强、便于维 护、支持传参，运行效率略低。适用场景：静态包含适用于头部、底部、导航栏等固定不变的公共 模块；动态包含适用于需要动态传参、内容实时变更、独立维护的页面模块。","id":1,"no":1}]}},{"title":"第三章 Tag 文件与 Tag 标记","questions":{"单项选择题":[{"question":"下列不属于 Tag 文件专属指令的是（ ）","options":{"A":"tag","B":"attribute","C":"page","D":"variable"},"answer":"C","id":1,"no":1},{"question":"想要标签支持 JSP 代码主体内容，body-content 应设置为（ ）","options":{"A":"empty","B":"JSP","C":"text","D":"scriptless"},"answer":"B","id":2,"no":2},{"question":"variable 指令中，指定变量名称的属性是（ ）","options":{"A":"name-given","B":"type","C":"scope","D":"required"},"answer":"A","id":3,"no":3},{"question":"自定义 Tag 标签的核心优势是（ ）","options":{"A":"提升代码编译速度","B":"封装通用模块，简化页面代码","C":"无需服务器运行","D":"支持客户端直接解析"},"answer":"B","id":4,"no":4}],"多项选择题":[{"question":"tag 指令可配置的页面特性有（ ）","options":{"A":"标签主体内容类型","B":"标签描述信息","C":"页面编码格式","D":"脚本支持权限"},"answer":"ABCD","id":1,"no":1},{"question":"自定义 Tag 标签的应用场景包含（ ）","options":{"A":"封装分页通用代码","B":"封装日期格式化工具","C":"封装页面公共统计模块","D":"封装数据库核心逻辑"},"answer":"ABCD","id":2,"no":2},{"question":"关于 Tag 标签调用规则说法正确的有（ ）","options":{"A":"必须通过 taglib 指令引入标签库","B":"标签前缀可自定义，不重复即可","C":"支持嵌套调用，层级无限制","D":"必选属性未传参会直接报错"},"answer":"ABCD","id":3,"no":3}],"填空题":[{"question":"attribute 指令中，__________属性用于设置参数是否为必传项。","answer":"required","id":1,"no":1},{"question":"自定义 Tag 文件的专属后缀是__________。","answer":".tag","id":2,"no":2}],"判断题":[{"question":"自定义 Tag 标签可以有效减少 JSP 页面 Java 脚本冗余。（ ）","answer":"正确","id":1,"no":1},{"question":"variable 指令定义的变量仅能在标签内部使用。（ ）","answer":"错误","id":2,"no":2}],"简答题":[{"question":"简述 Tag 文件中 attribute 指令与 variable 指令的核心区别与各自作用。","answer":"1.attribute 指令：作用是定义标签的传入参数，用于接收调用标签时传递的外部数据， 支持设置参数类型、是否必传、是否支持动态表达式，数据流向是「页面→标签」；2.variable 指 令：作用是定义标签的输出变量，用于将标签内部处理后的结果数据传递给外部 JSP 页面，可指定 变量名称、作用域、数据类型，数据流向是「标签→页面」。简单来说，attribute 用于接收参数， variable 用于返回结果，二者配合实现自定义标签的数据交互。","id":1,"no":1}]}},{"title":"第四章 JSP 内置对象","questions":{"单项选择题":[{"question":"生命周期最短、仅当前页面有效的域对象是（ ）","options":{"A":"pageContext","B":"request","C":"session","D":"application"},"answer":"A","id":1,"no":1},{"question":"获取复选框、下拉框多值参数的 request 方法是（ ）","options":{"A":"getParameter()","B":"getParameterValues()","C":"getAttribute()","D":"getParameterMap()"},"answer":"B","id":2,"no":2},{"question":"下列不属于 response 对象功能的是（ ）","options":{"A":"设置页面响应编码","B":"客户端重定向跳转","C":"获取客户端请求参数","D":"设置响应头信息"},"answer":"C","id":3,"no":3},{"question":"以下操作不会销毁 session 的是（ ）","options":{"A":"主动调用 invalidate()","B":"会话超时","C":"刷新当前页面","D":"服务器关闭"},"answer":"C","id":4,"no":4},{"question":"pageContext 对象的核心作用是（ ）","options":{"A":"全局数据共享","B":"统一管理所有域对象与内置对象","C":"接收用户请求","D":"响应页面数据"},"answer":"B","id":5,"no":5},{"question":"清空 out 缓冲区未输出内容的方法是（ ）","options":{"A":"flush()","B":"clear()","C":"close()","D":"write()"},"answer":"B","id":6,"no":6},{"question":"统计网站总访问人数，最合适的域对象是（ ）","options":{"A":"request","B":"session","C":"application","D":"pageContext"},"answer":"C","id":7,"no":7}],"多项选择题":[{"question":"关于 request 域对象说法正确的有（ ）","options":{"A":"单次请求有效","B":"服务器转发可保留数据","C":"重定向跳转数据丢失","D":"所有用户共享数据"},"answer":"ABC","id":1,"no":1},{"question":"session 对象可实现的功能有（ ）","options":{"A":"存储用户登录状态","B":"记录用户浏览轨迹","C":"设置会话超时时间","D":"获取唯一会话 ID"},"answer":"ABCD","id":2,"no":2},{"question":"response 对象可设置的响应特性有（ ）","options":{"A":"页面编码格式","B":"响应内容类型","C":"页面定时跳转","D":"禁止页面缓存"},"answer":"ABCD","id":3,"no":3},{"question":"四大域对象的共性特点有（ ）","options":{"A":"均支持 setAttribute 存数据","B":"均支持 getAttribute 取数据","C":"均支持 removeAttribute 删数据","D":"生命周期完全一致"},"answer":"ABC","id":4,"no":4},{"question":"属于页面级内置对象的有（ ）","options":{"A":"pageContext","B":"out","C":"page","D":"exception"},"answer":"ABCD","id":5,"no":5}],"填空题":[{"question":"获取所有请求参数封装为 Map 集合的方法是__________。","answer":"getParameterMap()","id":1,"no":1},{"question":"手动刷新 out 缓冲区的方法是__________。","answer":"flush()","id":2,"no":2},{"question":"获取当前 session 唯一标识的方法是__________。","answer":"getId()","id":3,"no":3},{"question":"pageContext 设置页面域数据的方法是__________。","answer":"setAttribute()","id":4,"no":4}],"判断题":[{"question":"application 域数据服务器重启后会清空。（ ）","answer":"正确","id":1,"no":1},{"question":"重定向跳转属于两次独立请求，request 数据无法共享。（ ）","answer":"正确","id":2,"no":2},{"question":"out 对象缓冲区默认开启，可手动关闭刷新功能。（ ）","answer":"正确","id":3,"no":3}],"简答题":[{"question":"简述 JSP 四大域对象的生命周期、作用范围及适用场景。","answer":"1.pageContext（页面域）：生命周期最短，仅当前页面有效，页面刷新、跳转即失 效，适用于当前页面临时数据存储；2.request（请求域）：单次请求响应周期有效，服务器转发可 共享数据，重定向失效，适用于单次请求的页面数据传递、表单数据暂存；3.session（会话域）： 单个用户单次浏览器会话有效，浏览器关闭、会话超时、主动销毁即失效，适用于存储用户登录信 息、个人专属数据；4.application（全局域）：服务器启动至关闭全程有效，所有用户共享，适用于 网站访问量统计、全局公共配置、全站共享数据存储。","id":1,"no":1}]}},{"title":"第五章 JSP 与 JavaBean","questions":{"单项选择题":[{"question":"标准 JavaBean 必须包含的核心构造方法是（ ）","options":{"A":"带参构造方法","B":"无参公共构造方法","C":"私有构造方法","D":"静态构造方法"},"answer":"B","id":1,"no":1},{"question":"<jsp:useBean>中 id 属性的作用是（ ）","options":{"A":"指定 Bean 完整类路径","B":"定义 Bean 实例对象名","C":"设置 Bean 作用域","D":"绑定表单参数"},"answer":"B","id":2,"no":2},{"question":"下列 Bean 作用域优先级最高的是（ ）","options":{"A":"page","B":"request","C":"session","D":"application"},"answer":"D","id":3,"no":3},{"question":"<jsp:setProperty>中 param 属性的作用是（ ）","options":{"A":"固定赋值","B":"绑定指定表单参数赋值","C":"批量自动赋值","D":"清空属性值"},"answer":"B","id":4,"no":4},{"question":"整型属性 age 的标准取值方法是（ ）","options":{"A":"age()","B":"getAge()","C":"isAge()","D":"setAge()"},"answer":"B","id":5,"no":5},{"question":"适合存储全站公共数据的 Bean 作用域是（ ）","options":{"A":"application","B":"session","C":"request","D":"page"},"answer":"A","id":6,"no":6},{"question":"工具类 Bean 的核心特点是（ ）","options":{"A":"必须遵循 JavaBean 规范","B":"仅封装业务工具方法，无需属性封装","C":"必须有 get/set 方法","D":"仅能在当前页面使用"},"answer":"B","id":7,"no":7},{"question":"表单参数名与 Bean 属性名不一致时，需使用的赋值方式是（ ）","options":{"A":"批量赋值 property=\"*\"","B":"param 指定参数名赋值","C":"value 固定赋值","D":"无法赋值"},"answer":"B","id":8,"no":8}],"多项选择题":[{"question":"标准实体 Bean 的编写规范包含（ ）","options":{"A":"类修饰符为 public","B":"成员变量私有化","C":"提供公共无参构造","D":"属性对应标准 get/set 方法"},"answer":"ABCD","id":1,"no":1},{"question":"JavaBean 在 JSP 中的核心应用场景有（ ）","options":{"A":"封装表单提交数据","B":"封装数据库查询数据","C":"封装通用工具业务","D":"实现页面跳转功能"},"answer":"ABC","id":2,"no":2},{"question":"关于 Bean 作用域生命周期说法正确的有（ ）","options":{"A":"page：页面结束立即销毁","B":"request：请求结束立即销毁","C":"session：会话结束销毁","D":"application：服务器关闭销毁"},"answer":"ABCD","id":3,"no":3},{"question":"使用 JavaBean 开发的代码优化优势有（ ）","options":{"A":"分离视图与业务数据","B":"减少 JSP 页面 Java 代码","C":"统一数据封装格式","D":"提升代码复用与维护性"},"answer":"ABCD","id":4,"no":4},{"question":"<jsp:getProperty>标签的使用要求有（ ）","options":{"A":"必须先通过 useBean 实例化 Bean","B":"属性名必须与 Bean 定义一致","C":"无需对应 set 方法即可取值","D":"支持动态修改属性值"},"answer":"AB","id":5,"no":5}],"填空题":[{"question":"<jsp:useBean>中指定 Bean 完整类路径的属性是__________。","answer":"class","id":1,"no":1},{"question":"布尔类型属性的标准读取方法前缀是__________。","answer":"is","id":2,"no":2},{"question":"表单参数与 Bean 属性名不一致时，需通过__________属性精准绑定参数。","answer":"param","id":3,"no":3},{"question":"工具类 Bean 主要用于封装__________，无需遵循实体 Bean 规范。","answer":"通用工具业务逻辑","id":4,"no":4}],"判断题":[{"question":"JavaBean 实体类必须同时具备 get 和 set 方法，缺一不可。（ ）","answer":"错误","id":1,"no":1},{"question":"同一作用域内，相同 id 的 Bean 对象只会实例化一次。（ ）","answer":"正确","id":2,"no":2},{"question":"value 赋值方式可直接为 Bean 属性设置固定常量值。（ ）","answer":"正确","id":3,"no":3}],"简答题":[{"question":"简述 JavaBean 分层开发的意义及实体 Bean 与工具 Bean 的区别。","answer":"开发意义：通过 JavaBean 实现数据与视图分离，将数据封装、业务逻辑与页面展示 代码解耦，简化 JSP 页面结构，减少冗余脚本代码，统一代码规范，提升项目复用性、可读性与可 维护性。二者区别：1.实体 Bean：严格遵循 JavaBean 规范，包含私有属性、无参构造、get/set 方 法，核心作用是封装实体数据（表单数据、数据库数据），用于数据传输与存储；2.工具 Bean：无 需遵循规范，无固定属性要求，核心作用是封装通用工具方法（数据库连接、数据校验、日期处 理、加密解密），用于实现业务功能复用，不负责数据封装存储。","id":1,"no":1}]}},{"title":"第六章 Java Servlet 基础","questions":{"单项选择题":[{"question":"HttpServlet 的直接父类是（ ）","options":{"A":"Servlet","B":"GenericServlet","C":"Object","D":"ContextServlet"},"answer":"B","id":1,"no":1},{"question":"下列关于 GET 请求说法错误的是（ ）","options":{"A":"参数拼接在 URL 后","B":"数据明文展示，安全性低","C":"无数据长度限制","D":"可被浏览器缓存"},"answer":"C","id":2,"no":2},{"question":"Servlet 中处理所有请求的总调度方法是（ ）","options":{"A":"doGet()","B":"doPost()","C":"service()","D":"init()"},"answer":"C","id":3,"no":3},{"question":"开启 Servlet 服务器启动优先加载的属性是（ ）","options":{"A":"loadOnStartup"," 下，__________变量线程安全。","answer":"局部","id":4,"no":4},{"question":"注解配置 Servlet 访问路径的属性是__________。","answer":"urlPatterns/value","id":5,"no":5}],"判断题":[{"question":"Servlet 采用单例多线程模式运行，全局唯一实例。（ ）","answer":"正确","id":1,"no":1},{"question":"POST 请求参数不会被浏览器缓存，安全性更高。（ ）","answer":"正确","id":2,"no":2},{"question":"服务器转发可以跳转外部网站链接。（ ）","answer":"错误","id":3,"no":3},{"question":"init()方法仅执行一次，用于初始化全局资源。（ ）","answer":"正确","id":4,"no":4}],"简答题":[{"question":"简述 GET 与 POST 请求的核心区别及各自适用场景。","answer":"核心区别：1.参数位置：GET 参数拼接在 URL 地址栏，POST 参数封装在请求体；2. 数据限制：GET 有长度限制，POST 无长度限制；3.安全性：GET 明文展示、可缓存、易泄露， POST 参数隐藏、不可缓存、安全性高；4.书签缓存：GET 可保存书签、被浏览器缓存，POST 无 法缓存、不支持书签。适用场景：GET 适用于查询类、无数据修改、参数短小的请求，如页面跳 转、数据查询、列表展示；POST 适用于提交类、数据修改、参数量大、安全性要求高的请求，如 用户注册登录、表单提交、文件上传、数据新增修改删除。","id":1,"no":1}]}},{"title":"第七章 MVC 模式","questions":{"单项选择题":[{"question":"MVC 模式中，专门处理后台业务与数据操作的层级是（ ）","options":{"A":"View 视图层","B":"Controller 控制层","C":"Model 模型层","D":"全局层"},"answer":"C","id":1,"no":1},{"question":"下列不属于 MVC 控制层职责的是（ ）","options":{"A":"接收客户端请求","B":"调用模型层业务方法","C":"渲染页面展示数据","D":"实现页面跳转调度"},"answer":"C","id":2,"no":2},{"question":"MVC 架构的核心解决的问题是（ ）","options":{"A":"提升编译速度","B":"解决代码耦合严重、层级混乱问题","C":"简化代码行数","D":"减少服务器资源占用"},"answer":"B","id":3,"no":3},{"question":"JSP MVC 架构中，视图层的核心职责是（ ）","options":{"A":"处理数据库逻辑","B":"接收请求参数","C":"纯页面数据展示，无业务逻辑","D":"调度业务流程"},"answer":"C","id":4,"no":4}],"多项选择题":[{"question":"JSP 混编模式的主要弊端包含（ ）","options":{"A":"HTML 与 Java 代码高度耦合","B":"业务逻辑与页面展示混杂","C":"代码臃肿混乱，难以维护","D":"无法实现复杂业务功能"},"answer":"ABC","id":1,"no":1},{"question":"MVC 三层架构标准职责划分正确的有（ ）","options":{"A":"Model：封装数据、处理业务、操作数据库","B":"Controller：接收请求、调度流程、跳转视图","C":"View：展示数据、渲染页面、接收用户交互","D":"三层可跨层随意调用，无层级限制"},"answer":"ABC","id":2,"no":2},{"question":"MVC 分层开发的核心价值有（ ）","options":{"A":"代码解耦，各司其职","B":"模块独立，复用性强","C":"便于团队分工开发","D":"便于后期迭代维护与 bug 修复"},"answer":"ABCD","id":3,"no":3}],"填空题":[{"question":"JSP MVC 架构中，控制层由__________实现。","answer":"Servlet","id":1,"no":1},{"question":"MVC 模式中，__________层不直接对接客户端，仅提供后台业务支撑。","answer":"模型（Model）","id":2,"no":2}],"判断题":[{"question":"MVC 分层开发实现了业务逻辑与页面展示的完全分离。（ ）","answer":"正确","id":1,"no":1},{"question":"MVC 架构中，视图层可以直接操作数据库处理数据。（ ）","answer":"错误","id":2,"no":2}],"简答题":[{"question":"对比传统 JSP 混编模式，简述 MVC 模式的优势与开发价值。","answer":"传统混编模式弊端：页面中 HTML、CSS、JS、Java 代码混杂，业务逻辑与视图展示 耦合严重，代码臃肿冗余，可读性差，维护难度高，无法团队分工，复用性极低。MVC 模式优势： 1.分层清晰：视图、控制、模型各司其职，代码结构规整；2.完全解耦：业务逻辑与页面展示分离， 修改页面不影响后台逻辑，修改业务不影响前端视图；3.复用性高：模型层业务代码可多页面复 用，无需重复编写；4.便于协作：前端专注页面开发，后端专注业务逻辑，适配团队开发；5.易于维 护：bug 定位精准，迭代升级便捷，大幅降低项目维护成本。","id":1,"no":1}]}},{"title":"第八章 JSP 中使用数据库","questions":{"单项选择题":[{"question":"JDBC 的核心作用是（ ）","options":{"A":"优化 SQL 语句","B":"提供 Java 操作数据库的统一接口","C":"自动管理数据库事务","D":"实现数据库自动备份"},"answer":"B","id":1,"no":1},{"question":"删除数据表中指定条件数据的 SQL 关键字是（ ）","options":{"A":"TRUNCATE","B":"DELETE","C":"DROP","D":"CLEAR"},"answer":"B","id":2,"no":2},{"question":"数据库事务的原子性是指（ ）","options":{"A":"事务操作相互隔离","B":"事务要么全部执行成功，要么全部回滚失败","C":"数据状态始终一致","D":"提交后数据永久生效"},"answer":"B","id":3,"no":3},{"question":"MySQL 分页 limit 5 offset 2 的含义是（ ）","options":{"A":"查询前 5 条数据","B":"跳过 2 条，查询 5 条数据","C":"跳过 5 条，查询 2 条数据","D":"查询第 2 条数据"},"answer":"B","id":4,"no":4},{"question":"SQL 注入漏洞的核心成因是（ ）","options":{"A":"使用预处理语句","B":"字符串拼接 SQL 语句，未过滤参数","C":"关闭数据库事务","D":"未关闭 IO 资源"},"answer":"B","id":5,"no":5},{"question":"手动提交事务的 JDBC 方法是（ ）","options":{"A":"commit()","B":"rollback()","C":"execute()","D":"close()"},"answer":"A","id":6,"no":6},{"question":"SQL Server 数据库的默认端口号是（ ）","options":{"A":"3306","B":"1433","C":"8080","D":"80"},"answer":"B","id":7,"no":7},{"question":"数据库连接池的工作机制是（ ）","options":{"A":"每次请求新建连接","B":"预先创建连接、循环复用、使用后归还","C":"自动删除无效连接","D":"无限创建连接"},"answer":"B","id":8,"no":8},{"question":"遍历 ResultSet 结果集，判断是否存在下一条数据的方法是（ ）","options":{"A":"next()","B":"hasNext()","C":"get()","D":"find()"},"answer":"A","id":9,"no":9},{"question":"查询数据表所有字段、所有数据的 SQL 语句是（ ）","options":{"A":"SELECT * FROM 表名","B":"SELECT ALL 表名","C":"QUERY * 表名","D":"FIND ALL 表名"},"answer":"A","id":10,"no":10},{"question":"开启手动事务的核心操作是（ ）","options":{"A":"设置自动提交为 true","B":"设置自动提交为 false","C":"执行 commit","D":"执行 rollback"},"answer":"B","id":11,"no":11},{"question":"预处理语句的 SQL 执行特点是（ ）","options":{"A":"实时拼接执行","B":"预编译一次，多次高效执行","C":"无需编译直接执行","D":"仅能执行查询语句"},"answer":"B","id":12,"no":12}],"多项选择题":[{"question":"JDBC 编程必须遵循的步骤有（ ）","options":{"A":"加载数据库驱动","B":"获取数据库连接","C":"执行 SQL 语句处理结果","D":"关闭所有数据库资源"},"answer":"ABCD","id":1,"no":1},{"question":"预处理语句相较于静态语句的优势有（ ）","options":{"A":"预编译提升执行效率","B":"占位符传参杜绝 SQL 注入","C":"支持批量参数赋值","D":"自动关闭资源连接"},"answer":"ABC","id":2,"no":2},{"question":"数据库事务的适用场景有（ ）","options":{"A":"转账操作","B":"批量数据新增修改","C":"关联多表数据操作","D":"单条简单数据查询"},"answer":"ABC","id":3,"no":3},{"question":"数据库连接池可以解决的问题有（ ）","options":{"A":"频繁创建销毁连接消耗资源","B":"连接数量过多导致数据库崩溃","C":"提升数据库访问效率","D":"杜绝 SQL 注入漏洞"},"answer":"ABC","id":4,"no":4},{"question":"需要优先关闭的 JDBC 资源有（ ）","options":{"A":"ResultSet 结果集","B":"PreparedStatement 语句","C":"Connection 连接","D":"数据库服务进程"},"answer":"ABC","id":5,"no":5},{"question":"分页查询的实现要素有（ ）","options":{"A":"当前页码","B":"每页展示条数","C":"数据总条数","D":"总页数计算"},"answer":"ABCD","id":6,"no":6},{"question":"可有效防护 SQL 注入的手段有（ ）","options":{"A":"使用 PreparedStatement 预处理","B":"过滤用户特殊输入字符","C":"禁止 SQL 语句字符串拼接","D":"关闭数据库外部访问"},"answer":"ABC","id":7,"no":7},{"question":"数据库事务隔离性的作用包含（ ）","options":{"A":"防止事务相互干扰","B":"避免脏读、幻读、不可重复读","C":"保证数据操作独立安全","D":"确保事务执行成功"},"answer":"ABC","id":8,"no":8}],"填空题":[{"question":"JDBC 中关闭自动事务提交的方法是__________。","answer":"setAutoCommit(false)","id":1,"no":1},{"question":"批量执行 SQL 语句可使用 JDBC 的__________功能。","answer":"批量处理（batch）","id":2,"no":2},{"question":"根据字段名获取结果集数据的方法是__________。","answer":"getString()（对应各数据类型通用 getXXX()）","id":3,"no":3},{"question":"数据库事务四大特性简写为__________。","answer":"ACID","id":4,"no":4},{"question":"连接池的核心参数是最大连接数、最小连接数和__________。","answer":"最大空闲时间","id":5,"no":5},{"question":"清空数据表结构与数据的关键字是__________。","answer":"DROP","id":6,"no":6}],"判断题":[{"question":"预处理语句可完全杜绝 SQL 注入安全漏洞。（ ）","answer":"正确","id":1,"no":1},{"question":"事务回滚仅能撤销未提交的事务操作。（ ）","answer":"正确","id":2,"no":2},{"question":"数据库连接池连接数量越多，项目运行效率越高。（ ）","answer":"错误","id":3,"no":3},{"question":"ResultSet 结果集默认游标只能单向向下遍历。（ ）","answer":"正确","id":4,"no":4},{"question":"查询操作无需关闭数据库资源，系统自动回收。（ ）","answer":"错误","id":5,"no":5}],"简答题":[{"question":"简述数据库事务的 ACID 四大特性及各自核心作用。","answer":"数据库事务 ACID 四大特性是保证数据库数据安全、一致性的核心规范，具体内容及 作用如下：1.原子性（Atomicity）：指一个事务是不可分割的最小执行单元，事务内所有 SQL 操作 要么全部执行成功并提交，要么任意一步出错就全部回滚，不会出现部分执行、部分失败的中间状 态，杜绝数据残缺问题；2.一致性（Consistency）：事务执行前后，数据库整体数据完整性、约束 规则保持一致，不会破坏数据表主键、外键、唯一约束、字段规则，保证数据合法合规；3.隔离性 （Isolation）：多个并发执行的事务相互独立、互不干扰，数据库通过不同隔离级别，避免出现脏 读、不可重复读、幻读等数据异常问题，保障并发数据安全；4.持久性（Durability）：事务一旦执 行 commit 提交成功，数据修改永久生效并持久化保存，即使服务器断电、重启、崩溃，已提交的数 据也不会丢失。","id":1,"no":1}]}},{"title":"第九章 JSP 文件操作与上传下载","questions":{"单项选择题":[{"question":"Java 中专门用于描述文件和文件夹路径信息的类是（ ）","options":{"A":"FileOutputStream","B":"File","C":"BufferedReader","D":"InputStream"},"answer":"B","id":1,"no":1},{"question":"读取大容量文本文件，避免内存溢出的最优方式是（ ）","options":{"A":"一次性读取全部内容","B":"逐行读取文本内容","C":"逐个字节读取","D":"随机读取内容"},"answer":"B","id":2,"no":2},{"question":"JSP 文件下载过程中，解决中文文件名乱码的核心操作是（ ）","options":{"A":"设置页面编码为 UTF-8","B":"对响应文件名进行 URL 编码","C":"关闭页面缓存","D":"重置缓冲区内容"},"answer":"B","id":3,"no":3},{"question":"以下关于 IO 流关闭顺序说法正确的是（ ）","options":{"A":"先关闭外层包装流，再关闭内层节点流","B":"先关闭内层节点流，再关闭外层包装流","C":"无需手动关闭，系统自动回收","D":"任意顺序关闭均可"},"answer":"A","id":4,"no":4}],"多项选择题":[{"question":"下列属于 File 类可实现的操作有（ ）","options":{"A":"创建文件/文件夹","B":"删除文件/空文件夹","C":"获取文件大小、修改时间","D":"修改文件内容数据"},"answer":"ABC","id":1,"no":1},{"question":"关于字节流与字符流差异和适用场景，说法正确的有（ ）","options":{"A":"字节流基于字节操作，适配所有类型文件","B":"字符流基于字符操作，仅适配文本文件","C":"字节流无缓冲区，字符流自带缓冲区","D":"读写图片、视频、压缩包优先使用字节流"},"answer":"ABCD","id":2,"no":2},{"question":"JSP 文件上传的安全防护措施包含（ ）","options":{"A":"限制单文件最大上传大小","B":"过滤可执行恶意文件后缀","C":"生成唯一文件名防止文件覆盖","D":"限制上传目录访问权限，禁止执行脚本"},"answer":"ABCD","id":3,"no":3}],"填空题":[{"question":"创建单层文件夹的 File 核心方法是__________。","answer":"mkdir()","id":1,"no":1},{"question":"字符流读取文本单行数据的专属方法是__________。","answer":"readLine()","id":2,"no":2}],"判断题":[{"question":"File 类创建文件夹方法 mkdirs()支持创建多级目录。（ ）","answer":"正确","id":1,"no":1},{"question":"文件上传表单默认编码格式无需修改即可上传文件。（ ）","answer":"错误","id":2,"no":2}],"简答题":[{"question":"简述 JSP 文件下载的完整实现步骤及常见问题解决方案。","answer":"完整实现步骤：1. 前端页面定义下载链接，传递需要下载的文件名称或文件路径参 数；2. Servlet 接收请求参数，解析目标文件路径，通过 File 类判断文件是否存在、是否为合法文 件；3. 设置响应头信息，指定文件下载类型、弹窗下载模式，对中文文件名进行 URL 编码解决乱 码；4. 获取文件字节输入流，读取服务器文件数据；5. 获取响应输出流，循环读取文件字节并写入 响应流，推送至客户端；6. 手动关闭所有 IO 流资源，完成文件下载。常见问题解决方案：1.中文文 件名乱码：对文件名使用 URLEncoder 进行 UTF-8 编码处理；2.文件找不到 404：校验文件真实路 径，判断文件是否存在、是否为文件而非文件夹；3.文件覆盖、非法下载：校验文件后缀，限制下 载目录，禁止访问系统核心文件；4.文件损坏、下载不完整：严格按照外层到内层顺序关闭 IO 流， 循环读写确保数据完整传输。","id":1,"no":1}]}}],"note":"由《JSP 程序设计课程复习题 4》整理；按项目现有题库结构生成。"}};

/* ---------- normalize ---------- */
const TYPE_MAP = {
  "单项选择题":{key:"single",label:"单选题"},
  "多项选择题":{key:"multi",label:"多选题"},
  "判断题":{key:"judge",label:"判断题"},
  "填空题":{key:"fill",label:"填空题"},
  "简答题":{key:"short",label:"简答题"},
  "论述题":{key:"essay",label:"论述题"}
};
const TYPE_ORDER = ["single","multi","judge","fill","short","essay"];

function normalizeSource(key, raw) {
  const qs = [];
  const ranges = [];
  let stats = {};
  if (raw.chapters) {
    raw.chapters.forEach((ch, ci) => {
      ranges.push(ch.title || ("第" + (ci+1) + "部分"));
      Object.keys(ch.questions).forEach(tn => {
        const tm = TYPE_MAP[tn]; if (!tm) return;
        ch.questions[tn].forEach(q => {
          qs.push(Object.assign({source:key, chapter:ch.title||"", rangeIndex:ci, typeKey:tm.key, typeLabel:tm.label, typeName:tn}, q));
        });
      });
    });
  } else if (key === "shiti") {
    ranges.push("全部题目");
    Object.keys(raw.questions).forEach(tn => {
      const tm = TYPE_MAP[tn]; if (!tm) return;
      raw.questions[tn].forEach(q => {
        qs.push(Object.assign({source:key, chapter:"", rangeIndex:0, typeKey:tm.key, typeLabel:tm.label, typeName:tn}, q));
      });
    });
  } else if (key === "qimo") {
    raw.papers.forEach((p, pi) => {
      ranges.push("第" + (pi+1) + "套");
      Object.keys(p.questions).forEach(tn => {
        const tm = TYPE_MAP[tn]; if (!tm) return;
        p.questions[tn].forEach(q => {
          qs.push(Object.assign({source:key, chapter:"第"+(pi+1)+"套", rangeIndex:pi, typeKey:tm.key, typeLabel:tm.label, typeName:tn, paperNo:pi+1}, q));
        });
      });
    });
  }
  qs.forEach((q,i) => { q.uid = key + "_" + i; });
  TYPE_ORDER.forEach(tk => { stats[tk] = qs.filter(q => q.typeKey === tk).length; });
  return {key, title:raw.title, questions:qs, ranges, stats};
}

const SOURCES = {
  gailun: normalizeSource("gailun", RAW.gailun),
  shiti:  normalizeSource("shiti",  RAW.shiti),
  qimo:   normalizeSource("qimo",   RAW.qimo),
  jsp:    normalizeSource("jsp",    RAW.jsp),
  jsp2:   normalizeSource("jsp2",   RAW.jsp2),
  jsp3:   normalizeSource("jsp3",   RAW.jsp3)
};

/* ---------- state ---------- */
const S = {
  view: "home",
  sourceKey: null,
  selectedRanges: [],
  selectedTypes: [],
  mode: null,
  randomCount: 20,
  session: [],
  idx: 0,
  answers: [],
  graded: [],
  selfEval: []
};

const app = document.getElementById("app");

/* ---------- helpers ---------- */
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function $(html) {
  const d = document.createElement("div"); d.innerHTML = html.trim();
  return d.firstElementChild;
}
function statPills(stats) {
  const labels = {single:"单选",multi:"多选",judge:"判断",fill:"填空",short:"简答",essay:"论述"};
  return Object.keys(labels).filter(k => stats[k] > 0).map(k =>
    '<span class="stat-pill '+k+'">'+labels[k]+' '+stats[k]+'</span>'
  ).join("");
}

/* ---------- grading ---------- */
function gradeQuestion(q, userAnswer) {
  if (q.typeKey === "single" || q.typeKey === "judge") {
    return {correct: userAnswer === q.answer, userAnswer, correctAnswer: q.answer};
  }
  if (q.typeKey === "multi") {
    const ua = (userAnswer||[]).slice().sort().join("");
    const ca = (q.answer||"").split("").sort().join("");
    return {correct: ua === ca, userAnswer: (userAnswer||[]).sort().join(""), correctAnswer: q.answer};
  }
  if (q.typeKey === "fill") {
    const answers = Array.isArray(q.answer) ? q.answer : [q.answer];
    const ua = userAnswer || [];
    let allCorrect = true;
    const perBlank = answers.map((a, i) => {
      const u = (ua[i]||"").trim();
      const norm = s => s.replace(/\s+/g,"").toLowerCase();
      const ok = norm(u) === norm(a);
      if (!ok) allCorrect = false;
      return {user: u, correct: a, ok};
    });
    return {correct: allCorrect, perBlank, correctAnswer: answers};
  }
  return null;
}

/* ---------- view: home ---------- */
function viewHome() {
  const cards = Object.keys(SOURCES).map(k => {
    const s = SOURCES[k];
    return '<div class="card source-card" data-src="'+k+'">'+
      '<div class="src-title">'+esc(s.title)+'</div>'+
      '<div class="src-stats">'+statPills(s.stats)+'</div>'+
      '<div style="margin-top:10px;font-size:13px;color:var(--muted)">共 '+s.questions.length+' 题 · '+s.ranges.length+' 个部分</div>'+
    '</div>';
  }).join("");
  app.innerHTML =
    '<div class="topbar"><h1><span class="logo">题</span>题库练习</h1></div>'+
    '<div class="section-label">选择题库</div>'+
    '<div class="source-grid">'+cards+'</div>';
  app.querySelectorAll(".source-card").forEach(el => {
    el.addEventListener("click", () => {
      S.sourceKey = el.dataset.src;
      S.selectedRanges = [];
      S.selectedTypes = [];
      S.mode = null;
      viewSetup();
    });
  });
}

/* ---------- view: setup ---------- */
function viewSetup() {
  const src = SOURCES[S.sourceKey];
  const hasRanges = src.ranges.length > 1;

  const rangeChips = hasRanges ? src.ranges.map((r,i) =>
    '<span class="chip'+(S.selectedRanges.includes(i)?' active':'')+'" data-range="'+i+'">'+esc(r)+'</span>'
  ).join("") : "";

  const typeLabels = {single:"单选题",multi:"多选题",judge:"判断题",fill:"填空题",short:"简答题",essay:"论述题"};
  const availTypes = TYPE_ORDER.filter(t => src.stats[t] > 0);
  const typeChips = availTypes.map(t =>
    '<span class="chip'+(S.selectedTypes.includes(t)?' active':'')+'" data-type="'+t+'">'+typeLabels[t]+'</span>'
  ).join("");

  const countRow = S.mode === "random"
    ? '<div class="count-row"><label>随机抽题数量</label>'+
      '<input type="number" class="count-input" id="cnt" min="1" value="'+S.randomCount+'" max="'+src.questions.length+'"></div>'
    : "";

  app.innerHTML =
    '<div class="topbar"><h1><span class="logo">题</span>'+esc(src.title)+'</h1>'+
    '<button class="btn-back" id="backHome">← 返回</button></div>'+
    (hasRanges ? '<div class="section-label">选择范围</div><div class="chip-group" id="rangeGroup">'+rangeChips+'</div>' : '')+
    '<div class="section-label">题型筛选</div><div class="chip-group" id="typeGroup">'+typeChips+'</div>'+
    '<div class="section-label">练习模式</div><div class="mode-row">'+
      '<div class="mode-btn'+(S.mode==='sequential'?' active':'')+'" data-mode="sequential">'+
        '<div class="mode-icon">顺序</div><div class="mode-name">按顺序做题</div>'+
        '<div class="mode-desc">依原题序逐一练习</div></div>'+
      '<div class="mode-btn'+(S.mode==='random'?' active':'')+'" data-mode="random">'+
        '<div class="mode-icon">随机</div><div class="mode-name">随机抽题</div>'+
        '<div class="mode-desc">打乱顺序随机抽取</div></div>'+
    '</div>'+countRow+
    '<button class="start-btn" id="startBtn">开始练习</button>';

  if (hasRanges) {
    app.querySelectorAll("[data-range]").forEach(el => {
      el.addEventListener("click", () => {
        const i = +el.dataset.range;
        toggleArr(S.selectedRanges, i);
        if (S.selectedRanges.length === src.ranges.length) S.selectedRanges = [];
        viewSetup();
      });
    });
  }
  app.querySelectorAll("[data-type]").forEach(el => {
    el.addEventListener("click", () => {
      const t = el.dataset.type;
      toggleArr(S.selectedTypes, t);
      if (S.selectedTypes.length === availTypes.length) S.selectedTypes = [];
      viewSetup();
    });
  });
  app.querySelectorAll("[data-mode]").forEach(el => {
    el.addEventListener("click", () => { S.mode = el.dataset.mode; viewSetup(); });
  });
  const cnt = app.querySelector("#cnt");
  if (cnt) cnt.addEventListener("change", () => { S.randomCount = Math.max(1, +cnt.value||1); });
  app.querySelector("#backHome").addEventListener("click", viewHome);
  app.querySelector("#startBtn").addEventListener("click", startSession);
}
function toggleArr(arr, v) {
  const i = arr.indexOf(v);
  if (i >= 0) arr.splice(i,1); else arr.push(v);
}
function buildSession() {
  const src = SOURCES[S.sourceKey];
  let pool = src.questions;
  if (src.ranges.length > 1 && S.selectedRanges.length > 0) {
    pool = pool.filter(q => S.selectedRanges.includes(q.rangeIndex));
  }
  if (S.selectedTypes.length > 0) {
    pool = pool.filter(q => S.selectedTypes.includes(q.typeKey));
  }
  if (S.mode === "random") {
    pool = shuffle(pool).slice(0, S.randomCount);
  }
  return pool;
}
function startSession() {
  const src = SOURCES[S.sourceKey];
  if (src.ranges.length > 1 && S.selectedRanges.length === 0) {
    S.selectedRanges = src.ranges.map((_,i) => i);
  }
  if (S.selectedTypes.length === 0) {
    S.selectedTypes = TYPE_ORDER.filter(t => src.stats[t] > 0);
  }
  if (!S.mode) { alert("请选择练习模式"); return; }
  const session = buildSession();
  if (session.length === 0) { alert("所选范围内没有题目，请调整筛选条件"); return; }
  S.session = session;
  S.idx = 0;
  S.answers = session.map(() => null);
  S.graded = session.map(() => null);
  S.selfEval = session.map(() => null);
  viewPractice();
}

/* ---------- view: practice ---------- */
function viewPractice() {
  const q = S.session[S.idx];
  const total = S.session.length;
  const answered = S.graded.filter(g => g !== null).length;
  const correct = S.graded.filter(g => g && g.correct).length;
  const progress = ((S.idx) / total * 100).toFixed(0);

  app.innerHTML =
    '<div class="topbar"><h1><span class="logo">题</span>'+esc(SOURCES[S.sourceKey].title)+'</h1>'+
    '<button class="btn-back" id="exitBtn">← 退出</button></div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+progress+'%"></div></div>'+
    '<div class="progress-info"><span>第 '+(S.idx+1)+' / '+total+' 题</span>'+
    '<span class="score-badge">已对 '+correct+' / '+answered+' 已答</span></div>'+
    '<div class="card" id="qCard"></div>'+
    '<div class="action-row" id="actionRow"></div>'+
    '<div class="hint">快捷键: 数字键选选项 · J/K 判断 · Enter 提交/下一题</div>';

  renderQuestion(q);
  renderActions(q);
  bindKeys(q);
  app.querySelector("#exitBtn").addEventListener("click", () => { if (confirm("确定退出练习？进度将不保存")) viewHome(); });
}
function renderQuestion(q) {
  const card = app.querySelector("#qCard");
  const graded = S.graded[S.idx];
  let body = "";
  body += '<div class="q-meta"><span class="type-badge '+q.typeKey+'">'+q.typeLabel+'</span>';
  if (q.chapter) body += '<span class="src-badge">'+esc(q.chapter)+'</span>';
  body += '</div>';
  body += '<div class="q-stem">'+esc(q.question)+'</div>';

  if (q.typeKey === "single" || q.typeKey === "multi") {
    const letters = Object.keys(q.options).sort();
    const isMulti = q.typeKey === "multi";
    const ua = S.answers[S.idx] || (isMulti ? [] : null);
    body += '<div class="opt-list">';
    letters.forEach(l => {
      let cls = "opt-item";
      const selected = isMulti ? ua.includes(l) : ua === l;
      if (selected) cls += " selected";
      if (graded) {
        const ca = q.answer.split("");
        if (ca.includes(l)) cls += " correct";
        else if (selected) cls += " wrong";
      }
      body += '<div class="'+cls+'" data-opt="'+l+'">'+
        '<span class="opt-marker">'+l+'</span><span class="opt-text">'+esc(q.options[l])+'</span></div>';
    });
    body += '</div>';
  } else if (q.typeKey === "judge") {
    const ua = S.answers[S.idx];
    body += '<div class="judge-btns">';
    ["正确","错误"].forEach(v => {
      let cls = "judge-btn";
      if (ua === v) cls += " selected";
      if (graded) {
        if (q.answer === v) cls += " correct";
        else if (ua === v) cls += " wrong";
      }
      body += '<button class="'+cls+'" data-judge="'+v+'">'+v+'</button>';
    });
    body += '</div>';
  } else if (q.typeKey === "fill") {
    const answers = Array.isArray(q.answer) ? q.answer : [q.answer];
    const ua = S.answers[S.idx] || [];
    const parts = q.question.split(/（\s*）|_{2,}/);
    const blankCount = parts.length - 1;
    body = '<div class="q-meta"><span class="type-badge '+q.typeKey+'">'+q.typeLabel+'</span>';
    if (q.chapter) body += '<span class="src-badge">'+esc(q.chapter)+'</span>';
    body += '</div>';
    body += '<div class="q-stem">';
    for (let i = 0; i < parts.length; i++) {
      body += esc(parts[i]);
      if (i < blankCount) {
        const val = ua[i] || "";
        const ok = graded ? graded.perBlank[i].ok : null;
        let icls = "fill-input";
        if (ok === true) icls += " correct";
        if (ok === false) icls += " wrong";
        body += '<input type="text" class="'+icls+'" data-blank="'+i+'" value="'+esc(val)+'" placeholder="填空 '+(i+1)+'"'+(graded?' disabled':'')+'>';
      }
    }
    body += '</div>';
  } else {
    const ua = S.answers[S.idx] || "";
    body += '<textarea class="textarea-answer" id="taAns" placeholder="请输入你的答案…"'+(graded?' disabled':'')+'>'+esc(ua)+'</textarea>';
  }

  if (graded) {
    body += renderFeedback(q, graded);
  }
  card.innerHTML = body;
  bindQuestionInteractions(q);
}
function renderFeedback(q, graded) {
  let fb = "";
  if (q.typeKey === "single" || q.typeKey === "multi" || q.typeKey === "judge") {
    const ok = graded.correct;
    fb = '<div class="feedback '+(ok?'correct':'wrong')+'">'+
      '<div class="fb-title">'+(ok?'✓ 回答正确':'✗ 回答错误')+'</div>';
    if (!ok) {
      fb += '<div>正确答案：<strong>'+esc(q.answer)+'</strong></div>';
    }
    fb += '</div>';
  } else if (q.typeKey === "fill") {
    const ok = graded.correct;
    fb = '<div class="feedback '+(ok?'correct':'wrong')+'">'+
      '<div class="fb-title">'+(ok?'✓ 全部正确':'✗ 部分错误')+'</div>';
    if (!ok) {
      fb += '<div>正确答案：<strong>'+graded.perBlank.map(b => esc(b.correct)).join(' ｜  ')+'</strong></div>';
    }
    fb += '</div>';
  } else {
    const se = S.selfEval[S.idx];
    fb = '<div class="feedback info"><div class="fb-title">📋 参考答案</div>'+
      '<div>'+esc(q.answer)+'</div>';
    if (se !== null) {
      fb += '<div style="margin-top:8px;font-weight:600;color:'+(se?'var(--success)':'var(--error)')+'">你自评：'+(se?'答对了':'答错了')+'</div>';
    }
    fb += '<div class="self-eval">'+
      '<button class="se-right'+(se===true?' active':'')+'" data-se="1">✓ 我答对了</button>'+
      '<button class="se-wrong'+(se===false?' active':'')+'" data-se="0">✗ 我答错了</button>'+
    '</div></div>';
  }
  return fb;
}
function bindQuestionInteractions(q) {
  if (q.typeKey === "single") {
    app.querySelectorAll("[data-opt]").forEach(el => {
      el.addEventListener("click", () => {
        if (S.graded[S.idx]) return;
        S.answers[S.idx] = el.dataset.opt;
        renderQuestion(q); renderActions(q);
      });
    });
  } else if (q.typeKey === "multi") {
    app.querySelectorAll("[data-opt]").forEach(el => {
      el.addEventListener("click", () => {
        if (S.graded[S.idx]) return;
        let a = S.answers[S.idx] || [];
        const v = el.dataset.opt;
        if (a.includes(v)) a = a.filter(x => x !== v); else a = [...a, v];
        S.answers[S.idx] = a;
        renderQuestion(q); renderActions(q);
      });
    });
  } else if (q.typeKey === "judge") {
    app.querySelectorAll("[data-judge]").forEach(el => {
      el.addEventListener("click", () => {
        if (S.graded[S.idx]) return;
        S.answers[S.idx] = el.dataset.judge;
        renderQuestion(q); renderActions(q);
      });
    });
  } else if (q.typeKey === "fill") {
    app.querySelectorAll("[data-blank]").forEach(el => {
      el.addEventListener("input", () => {
        let a = S.answers[S.idx] || [];
        a[+el.dataset.blank] = el.value;
        S.answers[S.idx] = a;
        renderActions(q);
      });
    });
  } else {
    const ta = app.querySelector("#taAns");
    if (ta) ta.addEventListener("input", () => { S.answers[S.idx] = ta.value; renderActions(q); });
  }
  app.querySelectorAll("[data-se]").forEach(el => {
    el.addEventListener("click", () => {
      S.selfEval[S.idx] = el.dataset.se === "1";
      renderQuestion(q); renderActions(q);
    });
  });
}
function renderActions(q) {
  const row = app.querySelector("#actionRow");
  const graded = S.graded[S.idx];
  const isAuto = ["single","multi","judge","fill"].includes(q.typeKey);
  let html = "";
  if (S.idx > 0 && !graded) {
    html += '<button class="btn-prev" id="prevBtn">上一题</button>';
  }
  if (!graded) {
    const canSubmit = canSubmitAnswer(q);
    html += '<button class="btn-submit" id="submitBtn"'+(canSubmit?'':' disabled')+'>提交</button>';
  } else {
    if (S.idx < S.session.length - 1) {
      html += '<button class="btn-next" id="nextBtn">下一题 →</button>';
    } else {
      html += '<button class="btn-next" id="finishBtn">查看结果 →</button>';
    }
  }
  row.innerHTML = html;
  const prev = app.querySelector("#prevBtn"); if (prev) prev.addEventListener("click", () => { S.idx--; viewPractice(); });
  const sub = app.querySelector("#submitBtn"); if (sub) sub.addEventListener("click", submitCurrent);
  const nxt = app.querySelector("#nextBtn"); if (nxt) nxt.addEventListener("click", () => { S.idx++; viewPractice(); });
  const fin = app.querySelector("#finishBtn"); if (fin) fin.addEventListener("click", viewResult);
}
function canSubmitAnswer(q) {
  const a = S.answers[S.idx];
  if (q.typeKey === "single" || q.typeKey === "judge") return a !== null && a !== undefined;
  if (q.typeKey === "multi") return a && a.length > 0;
  if (q.typeKey === "fill") return a && a.some(x => x && x.trim());
  return a !== null && a !== undefined && a.trim().length > 0;
}
function submitCurrent() {
  const q = S.session[S.idx];
  const a = S.answers[S.idx];
  if (["single","multi","judge","fill"].includes(q.typeKey)) {
    S.graded[S.idx] = gradeQuestion(q, a);
  } else {
    S.graded[S.idx] = {correct: null};
  }
  viewPractice();
}

/* keyboard */
let keyHandler = null;
function bindKeys(q) {
  if (keyHandler) document.removeEventListener("keydown", keyHandler);
  keyHandler = function(e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    const graded = S.graded[S.idx];
    if (graded) {
      if (e.key === "Enter") {
        if (S.idx < S.session.length-1) { S.idx++; viewPractice(); }
        else viewResult();
      }
      return;
    }
    if (q.typeKey === "single") {
      const letters = Object.keys(q.options).sort();
      const n = parseInt(e.key);
      if (n >= 1 && n <= letters.length) {
        S.answers[S.idx] = letters[n-1];
        renderQuestion(q); renderActions(q);
      }
    } else if (q.typeKey === "multi") {
      const letters = Object.keys(q.options).sort();
      const n = parseInt(e.key);
      if (n >= 1 && n <= letters.length) {
        let a = S.answers[S.idx] || [];
        const v = letters[n-1];
        if (a.includes(v)) a = a.filter(x => x !== v); else a = [...a, v];
        S.answers[S.idx] = a;
        renderQuestion(q); renderActions(q);
      }
    } else if (q.typeKey === "judge") {
      if (e.key === "j" || e.key === "J") { S.answers[S.idx] = "正确"; renderQuestion(q); renderActions(q); }
      if (e.key === "k" || e.key === "K") { S.answers[S.idx] = "错误"; renderQuestion(q); renderActions(q); }
    }
    if (e.key === "Enter" && canSubmitAnswer(q)) submitCurrent();
  };
  document.addEventListener("keydown", keyHandler);
}

/* ---------- view: result ---------- */
function viewResult() {
  const total = S.session.length;
  let autoTotal = 0, autoCorrect = 0, autoWrong = 0;
  let selfTotal = 0, selfCorrect = 0;
  const wrongList = [];
  S.session.forEach((q, i) => {
    const g = S.graded[i];
    if (["single","multi","judge","fill"].includes(q.typeKey)) {
      autoTotal++;
      if (g.correct) autoCorrect++; else {
        autoWrong++;
        wrongList.push({q, userAns: S.answers[i], g});
      }
    } else {
      selfTotal++;
      if (S.selfEval[i] === true) selfCorrect++;
      else if (S.selfEval[i] === false) wrongList.push({q, userAns: S.answers[i], g});
    }
  });
  const pct = autoTotal > 0 ? Math.round(autoCorrect / autoTotal * 100) : 0;
  const overallCorrect = autoCorrect + selfCorrect;
  const overallTotal = autoTotal + selfTotal;

  let wrongHtml = "";
  if (wrongList.length > 0) {
    wrongHtml = '<div class="section-label" style="margin-top:24px">错题回顾 ('+wrongList.length+')</div>';
    wrongList.forEach((w, i) => {
      const q = w.q;
      let yours = "";
      if (q.typeKey === "fill") {
        yours = (w.userAns||[]).join(" ｜ ") || "(未作答)";
      } else if (q.typeKey === "short" || q.typeKey === "essay") {
        yours = (w.userAns||"").slice(0,100) || "(未作答)";
      } else {
        yours = w.userAns || "(未作答)";
      }
      let correctAns = q.answer;
      if (q.typeKey === "fill" && Array.isArray(q.answer)) correctAns = q.answer.join(" ｜ ");
      wrongHtml += '<div class="wrong-item">'+
        '<div class="wi-stem">'+(i+1)+'. ['+q.typeLabel+'] '+esc(q.question.slice(0,120))+(q.question.length>120?'…':'')+'</div>';
      if (q.typeKey === "short" || q.typeKey === "essay") {
        wrongHtml += '<div class="wi-ans">参考答案：'+esc(correctAns).slice(0,200)+(correctAns.length>200?'…':'')+'</div>';
        if (yours !== "(未作答)") wrongHtml += '<div class="wi-yours">你的答案：'+esc(yours)+'…</div>';
      } else {
        wrongHtml += '<div class="wi-ans">正确答案：'+esc(correctAns)+'</div>'+
          '<div class="wi-yours">你的答案：'+esc(yours)+'</div>';
      }
      wrongHtml += '</div>';
    });
  }

  app.innerHTML =
    '<div class="topbar"><h1><span class="logo">题</span>练习结果</h1>'+
    '<button class="btn-back" id="homeBtn">← 返回首页</button></div>'+
    '<div class="card">'+
      '<div class="result-hero">'+
        '<div class="result-score">'+overallCorrect+'<span class="total"> / '+overallTotal+'</span></div>'+
        '<div class="result-label">共答对 '+overallCorrect+' 题</div>'+
      '</div>'+
      '<div class="result-stats">'+
        '<div class="result-stat"><div class="num s">'+autoCorrect+'</div><div class="lbl">自动判分正确</div></div>'+
        '<div class="result-stat"><div class="num e">'+(autoWrong + (selfTotal - selfCorrect))+'</div><div class="lbl">错误/未掌握</div></div>'+
        '<div class="result-stat"><div class="num a">'+pct+'%</div><div class="lbl">客观题正确率</div></div>'+
      '</div>'+
      (selfTotal > 0 ? '<div style="text-align:center;margin-top:12px;font-size:13px;color:var(--muted)">主观题自评：'+selfCorrect+' / '+selfTotal+' 正确</div>' : '')+
    '</div>'+
    (wrongList.length > 0 ? '<div class="card">'+wrongHtml+'</div>' : '<div class="card"><div class="empty">全部答对，太棒了！</div></div>')+
    '<div class="result-actions">'+
      '<button class="btn-again" id="againBtn">再来一组</button>'+
      (wrongList.length > 0 ? '<button class="btn-wrong" id="wrongBtn">错题重练 ('+wrongList.length+')</button>' : '')+
      '<button class="btn-home" id="rHomeBtn">返回首页</button>'+
    '</div>';

  app.querySelector("#homeBtn").addEventListener("click", viewHome);
  app.querySelector("#rHomeBtn").addEventListener("click", viewHome);
  app.querySelector("#againBtn").addEventListener("click", () => { startSession(); });
  const wb = app.querySelector("#wrongBtn");
  if (wb) wb.addEventListener("click", startWrongReview);
}
function startWrongReview() {
  const wrongQs = [];
  S.session.forEach((q, i) => {
    const g = S.graded[i];
    const isAuto = ["single","multi","judge","fill"].includes(q.typeKey);
    if (isAuto) {
      if (!g.correct) wrongQs.push(q);
    } else {
      if (S.selfEval[i] === false) wrongQs.push(q);
    }
  });
  S.session = wrongQs.length > 0 ? wrongQs : S.session;
  S.idx = 0;
  S.answers = S.session.map(() => null);
  S.graded = S.session.map(() => null);
  S.selfEval = S.session.map(() => null);
  if (S.mode === "random") S.session = shuffle(S.session);
  viewPractice();
}

/* ---------- init ---------- */
viewHome();
</script>
</body>
</html>
